# .coderabbit.yaml — faf (Fiduciary Agent Framework, legal/policy templates)

reviews:
  auto_review:
    enabled: true

  path_instructions:
    - path: "policy-templates/**/*.md"
      instructions: |
        FAF defines governance rules and legal parameters for agent execution.
        Policy templates are machine-readable warranty definitions.
        - Verify each template has clear, deterministic conditions (no ambiguous language).
        - Check that parameter placeholders are documented.
        - Flag any template that grants blanket permissions without constraints.
        - Verify consistency with OEE enforcement primitives.

    - path: "legal-templates/**/*.md"
      instructions: |
        Legal templates map governance frameworks to specific jurisdictions and entity types.
        - Check that legal language is precise and references specific statutes or frameworks.
        - Verify templates cover the stated jurisdiction completely.
        - Flag any template that makes unqualified legal claims.

    - path: "examples/**"
      instructions: |
        - Verify examples use current template schemas.
        - Check that example parameters are realistic and consistent.

    - path: "architecture.md"
      instructions: |
        - Verify FAF architecture descriptions align with OEE and sigil-sign implementations.
        - Flag any outdated component references.

    - path: "**/*.md"
      instructions: |
        Check for internal consistency. Flag contradictions between policy and legal templates.

  path_filters:
    - "!.claude/**"
